<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试页面</title>
    <style>
        body { padding: 20px; font-family: Arial; }
        .test { color: red; font-size: 24px; }
    </style>
</head>
<body>
    <h1 class="test">如果你能看到这个，说明 HTML 正常工作</h1>

    <div id="vue-test">
        <h2>Vue 测试: {{ message }}</h2>
        <button @click="clickCount++">点击次数: {{ clickCount }}</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.min.js"></script>
    <script>
        console.log('页面加载了');
        console.log('Vue 是否可用:', typeof Vue !== 'undefined');

        new Vue({
            el: '#vue-test',
            data: {
                message: 'Vue 正常工作！',
                clickCount: 0
            }
        });

        console.log('Vue 实例已创建');
    </script>
</body>
</html>
